<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GameHub | Premium Gaming Platform</title>

    <meta name="description" content="GameHub - Play trending, viral, and premium games online">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🎮</span>
            <span class="logo-text">GameHub</span>
        </div>

        <div class="nav-controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Search games..." aria-label="Search games">
                <div id="searchSuggestions" class="search-suggestions"></div>
            </div>

            <select id="sortSelect" class="sort-select">
                <option value="default">📋 Default</option>
                <option value="trending">🔥 Trending</option>
                <option value="likes">⭐ Most Liked</option>
                <option value="views">👁 Most Viewed</option>
                <option value="recent">🆕 Recent</option>
            </select>

            <select id="categoryFilter" class="category-select">
                <option value="all">🎮 All Games</option>
                <option value="action">🎬 Action</option>
                <option value="racing">🏎 Racing</option>
                <option value="fps">🔫 FPS</option>
                <option value="casual">🎯 Casual</option>
                <option value="adventure">🗺 Adventure</option>
            </select>

            <button id="themeToggle" class="theme-btn">🌙</button>
            <button id="favoritesBtn" class="favorites-btn">❤️ <span id="favCount">0</span></button>
        </div>
    </nav>

    <div id="progressBar" class="progress-bar"></div>

    <main id="app" class="app-container">
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading awesome games...</p>
        </div>
    </main>

    <button id="scrollTopBtn" class="scroll-top">⬆</button>

    <!-- Cookie Modal -->
    <div id="cookieModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">🍪</span>
                <h3>Cookie Preferences</h3>
            </div>
            <p>We use cookies to enhance your gaming experience.</p>
            <div class="modal-actions">
                <button id="acceptCookiesBtn" class="btn-primary">Accept</button>
                <button id="rejectCookiesBtn" class="btn-secondary">Reject</button>
            </div>
        </div>
    </div>

    <!-- Ad Popup -->
    <div id="adPopup" class="modal ad-popup">
        <div class="modal-content">
            <img id="popupAdImage" src="" alt="Advertisement" style="width:100%;border-radius:12px">
            <p id="popupAdDesc" style="margin:12px 0"></p>
            <a id="popupAdLink" href="#" target="_blank" class="btn-primary">Learn More</a>
            <button id="closeAdPopupBtn" class="btn-secondary" style="margin-top:10px">Continue to Game</button>
        </div>
    </div>

    <!-- Security Modal -->
    <div id="securityModal" class="modal">
        <div class="modal-content" style="text-align:center">
            <div style="font-size:50px">😢</div>
            <h3>Why you spying bro?</h3>
            <p>Just enjoy the games like a normal person! 🎮</p>
            <button id="closeSecurityBtn" class="btn-primary">I'll behave 🙏</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ads.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
